workflows:
  android-debug-build:
    name: Mythic Android Debug Build
    max_build_duration: 60
    environment:
      java: 17
      vars:
        GEMINI_API_KEY: $GEMINI_API_KEY
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_KEY: $SUPABASE_KEY
    scripts:
      - name: Create .env file
        script: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          echo "SUPABASE_URL=$SUPABASE_URL" >> .env
          echo "SUPABASE_KEY=$SUPABASE_KEY" >> .env
      - name: Setup Gradle wrapper
        script: |
          mkdir -p gradle/wrapper
          curl -L "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.14.1/gradle-wrapper-8.14.1.jar" -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.14.1-bin.zip\nnetworkTimeout=10000\nvalidateDistributionUrl=true\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.14.1/gradlew" -o gradlew
          chmod +x gradlew
          echo "Wrapper setup complete"
      - name: Create debug keystore
        script: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
